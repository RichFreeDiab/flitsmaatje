# Verificatie + automatische TestFlight alleen als alles groen is.
name: iOS Verify

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  carplay-selftest:
    name: CarPlay selftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python dependencies
        run: python3 -m pip install --break-system-packages flask gunicorn -q

      - name: Start Flask
        run: |
          gunicorn -b 127.0.0.1:5068 -w 1 app:app --timeout 30 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5068/ && break
            sleep 1
          done

      - name: Run CarPlay selftest
        run: python3 scripts/carplay_selftest.py http://127.0.0.1:5068

      - name: CarPlay demo page
        run: curl -sf http://127.0.0.1:5068/carplay | grep -q "CarPlay Demo"

  ios-simulator-build:
    name: iOS simulator compile
    runs-on: macos-26
    timeout-minutes: 20
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Genereer app-icoon
        run: |
          python3 -m venv /tmp/flitsmaatje-icon-venv
          /tmp/flitsmaatje-icon-venv/bin/pip install pillow -q
          /tmp/flitsmaatje-icon-venv/bin/python ios/scripts/generate_icon.py

      - name: Genereer Xcode-project
        working-directory: ios
        run: xcodegen generate

      - name: Build voor iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project FlitsMaatje.xcodeproj \
            -scheme FlitsMaatje \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | xcbeautify

  testflight:
    name: TestFlight deploy
    needs: [carplay-selftest, ios-simulator-build]
    runs-on: macos-26
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: "Homebrew: untap aws/tap (workaround)"
        run: brew untap aws/tap || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Installeer Ruby gems
        working-directory: ios
        run: bundle install --jobs 4 --retry 3

      - name: Genereer app-icoon
        run: |
          python3 -m venv /tmp/flitsmaatje-icon-venv
          /tmp/flitsmaatje-icon-venv/bin/pip install pillow -q
          /tmp/flitsmaatje-icon-venv/bin/python ios/scripts/generate_icon.py

      - name: Genereer Xcode-project
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"${APPLE_TEAM_ID}\"/" project.yml
          xcodegen generate

      - name: Build & upload TestFlight
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLITSMAATJE_CHANGELOG: "Crashfix: BootLogger stack overflow bij opstart"
        run: bundle exec fastlane beta

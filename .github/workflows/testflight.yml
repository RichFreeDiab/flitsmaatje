# UITGESCHAKELD — vereist Apple Developer-account (€99/jaar).
# Handmatig opnieuw starten via Actions → Run workflow zodra secrets zijn ingesteld.
name: TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    if: false  # Geen auto-build zonder Apple Developer
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Installeer Ruby gems
        working-directory: ios
        run: bundle install --jobs 4 --retry 3

      - name: Genereer app-icoon
        run: python3 ios/scripts/generate_icon.py

      - name: Genereer Xcode-project
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"${APPLE_TEAM_ID}\"/" project.yml
          xcodegen generate

      - name: Build & upload TestFlight
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta

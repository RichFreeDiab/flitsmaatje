name: FlitsMaatje
options:
  bundleIdPrefix: nl.readvanes
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
configs:
  Debug: debug
  Release: release
targets:
  FlitsMaatje:
    type: application
    platform: iOS
    sources:
      - path: FlitsMaatje
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.readvanes.flitsmaatje
        INFOPLIST_FILE: FlitsMaatje/Info.plist
        CODE_SIGN_ENTITLEMENTS: FlitsMaatje/FlitsMaatje.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - target: FlitsMaatjeWidget
        embed: true

  FlitsMaatjeWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: FlitsMaatjeWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.readvanes.flitsmaatje.widget
        INFOPLIST_FILE: FlitsMaatjeWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: FlitsMaatjeWidget/FlitsMaatjeWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        SKIP_INSTALL: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

schemes:
  FlitsMaatje:
    build:
      targets:
        FlitsMaatje: all
        FlitsMaatjeWidget: all
    run:
      config: Debug
    archive:
      config: Release
